<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEPI Bank | Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Additional Register Page Styles */
        .auth-page {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #ecf0f1 100%);
            padding: 2rem 1rem;
        }

        .auth-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            animation: slideUp 0.6s ease;
        }

        .auth-header {
            background: linear-gradient(135deg, #4a90e2 0%, #2c5aa0 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .auth-header h2 {
            font-size: 2rem;
            margin: 0 0 0.5rem 0;
            color: white;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .auth-header p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3px;
        }

        .auth-form {
            padding: 2.5rem;
        }

        .input-group {
            margin-bottom: 1.8rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.7rem;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Roboto', sans-serif;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .input-group input:hover {
            border-color: #6ba8f5;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4a90e2;
            background: white;
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15);
        }

        .input-group input::placeholder {
            color: #bdc3c7;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4a90e2 0%, #2c5aa0 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(74, 144, 226, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.99);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .auth-footer {
            padding: 1.5rem 2.5rem;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .auth-footer p {
            margin: 0;
            color: #7f8c8d;
        }

        .auth-footer a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: #2c5aa0;
            text-decoration: underline;
        }

        /* Features List */
        .register-benefits {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            padding: 0 2rem 2rem;
        }

        .benefit-item {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.1), rgba(74, 144, 226, 0.05));
            transition: all 0.3s ease;
        }

        .benefit-item:hover {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.15), rgba(74, 144, 226, 0.1));
            transform: translateY(-2px);
        }

        .benefit-emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .benefit-text {
            font-size: 0.85rem;
            color: #7f8c8d;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .auth-container {
                border-radius: 12px;
            }

            .auth-header {
                padding: 2rem 1.5rem;
            }

            .auth-header h2 {
                font-size: 1.6rem;
            }

            .auth-form {
                padding: 1.5rem;
            }

            .auth-footer {
                padding: 1rem 1.5rem;
            }

            .register-benefits {
                padding: 0 1.5rem 1.5rem;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h1>🏛️ DEPI Bank</h1>
    </nav>

    <main class="auth-page">
        <div>
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Create Your Account</h2>
                    <p>Secure banking, just for you</p>
                </div>

                <form id="register-form" class="auth-form">
                    <div class="input-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required minlength="3" autocomplete="username"
                            placeholder="Choose a username" />
                    </div>

                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required minlength="6" autocomplete="new-password"
                            placeholder="Create a strong password" />
                    </div>

                    <div class="input-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" required placeholder="Your full name" />
                    </div>

                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>

                <div class="register-benefits">
                    <div class="benefit-item">
                        <span class="benefit-emoji">🔒</span>
                        <p class="benefit-text">Secure</p>
                    </div>
                    <div class="benefit-item">
                        <span class="benefit-emoji">⚡</span>
                        <p class="benefit-text">Fast</p>
                    </div>
                    <div class="benefit-item">
                        <span class="benefit-emoji">✨</span>
                        <p class="benefit-text">Easy</p>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Already have an account? <a href="/">Sign in here</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>

</html>
